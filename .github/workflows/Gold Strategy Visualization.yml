name: Gold Strategy Visualization

on:
  workflow_dispatch: # This creates the "Manual Run" button

jobs:
  visualize:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for git pull --rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # Only install the core visualization libraries
        run: pip install pandas seaborn matplotlib numpy

      - name: Generate Charts
        run: python visualize.py

      - name: Commit and Push Charts
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          git add *.png || echo "No new images"
          git commit -m "📈 Manual Visualization Update: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes"
          git pull --rebase origin main
          git push origin main
