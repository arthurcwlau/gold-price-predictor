name: Gold Strategy Visualization

on:
  workflow_dispatch: # This creates the "Manual Run" button

jobs:
  visualize:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Fetches history so rebase works

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install pandas seaborn matplotlib numpy

      - name: Generate Charts
        run: python visualize.py

      - name: Commit and Push Charts
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          
          # 1. Stage the new chart
          git add *.png || echo "No new images"
          
          # 2. Commit the change
          git commit -m "📈 Manual Visualization Update: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes"
          
          # 3. THE FIX: Pull the latest CSV from the hourly bot first
          git pull --rebase origin main
          
          # 4. Now push everything back
          git push origin main
