name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for the bot to save files back to your repo
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # We use Seaborn and Matplotlib for the visual engine
        run: |
          pip install pandas yfinance requests numpy seaborn matplotlib --upgrade

      - name: Run Analytics
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Generate Visuals
        # This runs the Seaborn visualization script
        run: python visualize.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          # This adds the updated CSV and any new PNG charts
          git add gold_investment_pro.csv *.png
          git commit -m "📊 Intelligence Pulse: $(date +'%Y-%m-%d %H:00') Z" || echo "No changes"
          git pull --rebase origin main
          git push origin main
