name: Gold Strategy Visualization

on:
  workflow_dispatch: # This creates the "Manual Run" button

jobs:
  visualize:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save and push the new charts
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history for proper rebasing

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # Optimized for Seaborn/Matplotlib reliability
        run: pip install pandas seaborn matplotlib

      - name: Generate Charts
        run: python visualize.py

      - name: Commit and Push Charts
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          
          # Stage any PNG files generated
          git add *.png || echo "No new images found"
          
          git commit -m "📈 Manual Visualization Update: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes"
          
          # Rebase helps prevent push errors if the hourly bot just updated the CSV
          git pull --rebase origin main
          git push origin main
