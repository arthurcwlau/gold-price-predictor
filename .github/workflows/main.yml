name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # This line kills the Node.js 20 warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          pip install requests pandas yfinance

      - name: Run the script
        run: python main.py

      - name: Save the data back to GitHub
        run: |
          git config --global user.name 'GoldBot'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Update daily gold data" || echo "No changes"
          # The '--force' below stops the "Rejected" error
          git push --force origin main
