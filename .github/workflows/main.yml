name: Gold Price Intelligence Pulse

on:
  schedule:
    # Runs at 9:00 AM New York time every weekday (2026 syntax)
    - cron: '0 9 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the bot to save the CSV back to your repo
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas yfinance requests

      - name: Run Analytics
        run: python gold_pulse.py

      - name: Commit and Push
        run: |
          git config --global user.name "Gold-Bot"
          git config --global user.email "bot@github.com"
          git add gold_investment_pro.csv
          git commit -m "📈 Auto-update: $(date)" || echo "No changes to commit"
          git push
