name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the robot the "Key"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches the full history to avoid sync errors

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run the script
        run: python main.py

      # This tool is the "Traffic Cop" that fixes the Exit Code 128
      - name: Auto-Save Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily gold data [bot]"
          file_pattern: 'gold_data.csv'
