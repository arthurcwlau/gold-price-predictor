name: Hourly Gold & Macro Scrape

on:
  schedule:
    # UPDATED: Runs at the top of every hour (24x per day)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run script
        run: python main.py

      - name: Auto-Save Pro Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly Alpha Update: [TNX/VIX/Velocity MA]"
          file_pattern: 'gold_investment_pro.csv'
