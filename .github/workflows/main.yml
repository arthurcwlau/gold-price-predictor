name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated for Node 24

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated for Node 24
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run the script
        run: python main.py

      - name: Save the data
        run: |
          git config --global user.name 'GoldBot'
          git config --global user.email 'bot@github.com'
          git add .
          git pull --rebase origin main
          git commit -m "Update daily gold data" || echo "No changes"
          git push origin main
