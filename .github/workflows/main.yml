name: Hourly Gold & Macro Scrape

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  # Opts into Node 24 as requested by GitHub Actions deprecation notice
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded for 2026 performance

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run script
        run: python main.py

      - name: Auto-Save Pro Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Robust Hourly Update [Node24 Active]"
          file_pattern: 'gold_investment_pro.csv'
