name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *' # Runs at 9pm UTC daily
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    # THIS BLOCK BELOW FIXES ERROR 128
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run the script
        run: python main.py

      - name: Save the data
        run: |
          git config --global user.name 'GoldBot'
          git config --global user.email 'bot@github.com'
          git add gold_data.csv
          # 'pull --rebase' ensures the robot stays in sync with your manual edits
          git pull --rebase origin main
          git commit -m "Update daily gold data" || echo "No changes"
          git push origin main
