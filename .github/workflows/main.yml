name: Hourly Gold & Macro Scrape

on:
  schedule:
    # Changed from 0 to 12 to avoid hourly traffic jams
    # Added timezone support (New March 2026 Feature)
    - cron: '12 * * * *'
      timezone: 'America/New_York' 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run script
        run: python main.py

      - name: Auto-Save Pro Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Robust Hourly Update [Node24 & DateFix]"
          file_pattern: 'gold_investment_pro.csv'
