name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *' # Hourly update
  workflow_dispatch:   # Allows manual trigger via the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install pandas yfinance requests matplotlib

      - name: Run Analytics (Data Collection)
        # --- THIS IS THE CRITICAL SECTION ---
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Run Visualization (Accuracy Chart)
        run: python visualize.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          # Add the CSV and the PNG image to the repository
          git add gold_investment_pro.csv gold_accuracy_report.png
          git commit -m "📊 Pro Update & Chart: $(date)" || echo "No changes to commit"
          git push
