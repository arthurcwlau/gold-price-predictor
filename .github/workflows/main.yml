name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *' # Runs hourly to capture 360+ data points for MA6
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: pip install pandas yfinance requests

      - name: Run Analytics
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          git add gold_investment_pro.csv
          git commit -m "📊 Pro Update: $(date)" || echo "No changes"
          git push
