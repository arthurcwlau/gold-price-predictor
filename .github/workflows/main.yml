name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # THIS BLOCK BELOW IS THE MAGIC KEY TO FIX ERROR 128
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This ensures the robot uses a fresh "Key"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run the script
        run: python main.py

      - name: Save the data
        run: |
          git config --global user.name 'GoldBot'
          git config --global user.email 'bot@github.com'
          git add gold_data.csv
          # This 'fetch' and 'rebase' makes sure the robot is in sync
          git fetch origin main
          git pull --rebase origin main
          git commit -m "Update daily gold data" || echo "No changes to commit"
          git push origin main
