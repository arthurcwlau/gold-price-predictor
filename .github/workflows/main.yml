name: Gold Tail Risk Extractor

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas yfinance fredapi requests numpy

      - name: Run Extraction
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "Gold-Bot"
          git config --global user.email "bot@macro.analyst"
          git add "gold_investment_pro (23).csv"
          git commit -m "Update Gold Moonshot and Macro Data: $(date)" || exit 0
          git push
