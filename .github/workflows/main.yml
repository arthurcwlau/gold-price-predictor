name: Hourly Gold & Macro Scrape

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # VERY IMPORTANT: Tells GitHub to see the whole file history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run script
        run: python main.py

      - name: Auto-Save Pro Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly Update [Backfill Active]"
          file_pattern: 'gold_investment_pro.csv'
