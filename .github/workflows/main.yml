name: Hourly Gold & Macro Scrape

on:
  schedule:
    - cron: '12 * * * *' # Still running at minute 12 to avoid GitHub traffic jams
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Keeps the logs clean from Node.js warnings

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows GitHub to save the CSV/PNG back to your repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install requests pandas yfinance matplotlib

      - name: Run Scraper
        run: python main.py

      - name: Run Visualizer
        # Removed the 'if' condition so this runs every hour now
        run: python visualize.py

      - name: Auto-Save Data & Charts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly Sync: Data + Momentum Chart"
          file_pattern: 'gold_investment_pro.csv momentum_report.png'
