name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the dot
  workflow_dispatch:   # Allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    # This ensures the bot has permission to save data back to your repo
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Fetches all history so rebase works correctly
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # Removed matplotlib to make the run faster
        run: pip install pandas yfinance --upgrade requests

      - name: Run Analytics (Data Collection)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          git add gold_investment_pro.csv
          
          # CRITICAL: Pull latest changes before pushing to avoid "Divergent Branch" errors
          git pull --rebase origin main
          
          # Only commit if the file actually changed
          git commit -m "📊 Intelligence Pulse: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes to commit"
          git push origin main
