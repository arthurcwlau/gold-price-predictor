name: Daily Gold Scrape

on:
  schedule:
    # UPDATED: Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Keep this so you can click "Run" manually!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install requests pandas yfinance

      - name: Run script
        run: python main.py

      - name: Auto-Save Pro Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update 2026 Gold Investment Pro Data [$(date)]"
          file_pattern: 'gold_investment_pro.csv'
