name: Hourly Gold & Macro Scrape

on:
  schedule:
    - cron: '12 * * * *' # Running at minute 12 to avoid congestion
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install requests pandas yfinance matplotlib

      - name: Run Scraper
        run: python main.py

      # NEW: Run visualization only once a day at 00:12 UTC
      - name: Run Visualizer
        if: github.event.schedule == '12 0 * * *' || github.event_name == 'workflow_dispatch'
        run: python visualize.py

      - name: Auto-Save Data & Charts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly Data Update & Daily Chart"
          file_pattern: 'gold_investment_pro.csv momentum_report.png'
