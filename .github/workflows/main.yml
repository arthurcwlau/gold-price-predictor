name: Daily Gold Scrape

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # This kills the Node 20 warning
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the script
        run: python main.py

      - name: Save the data back to GitHub
        run: |
          git config --global user.name 'GoldBot'
          git config --global user.email 'bot@github.com'
          git add gold_data.csv
          # This line below is the magic fix! 
          git pull --rebase origin main 
          git commit -m "Update daily gold data" || echo "No changes to commit"
          git push
