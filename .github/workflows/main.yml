name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install pandas yfinance --upgrade requests numpy
      - name: Run Analytics
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py
      - name: Commit and Push Results
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          git add gold_investment_pro.csv
          git commit -m "📊 Intelligence Unification: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes"
          git pull --rebase origin main
          git push origin main
