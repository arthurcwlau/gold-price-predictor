name: Gold Pro Intelligence Pulse

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the dot
  workflow_dispatch:   # Allows you to run it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    # CRITICAL: This gives the bot permission to save the CSV back to your repo
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Fetches full history so the rebase/sync works perfectly
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # Optimized to only install what is necessary for the CSV engine
        run: pip install pandas yfinance --upgrade requests

      - name: Run Analytics (Data Collection)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Gold-Pro-Bot"
          git config --global user.email "bot@github.com"
          
          # 1. Stage the updated CSV
          git add gold_investment_pro.csv
          
          # 2. Commit locally FIRST (Fixes the "index contains uncommitted changes" error)
          git commit -m "📊 Intelligence Pulse: $(date +'%Y-%m-%d %H:%M') Z" || echo "No changes to commit"
          
          # 3. Sync with any manual changes you made on GitHub.com
          git pull --rebase origin main
          
          # 4. Push the final synchronized data
          git push origin main
